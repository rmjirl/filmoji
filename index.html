<!DOCTYPE html>
<html>
<head>
    <title>Film Emoji Guessing Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Film Emoji Guessing Game</h1>
        <p>Can you guess the movie from the emojis?</p>
        <div id="emojiContainer">
            <span>🎬✨</span>
        </div>
        <input type="text" id="userInput" placeholder="Your Guess" />
        <button onclick="checkGuess()">Submit Guess</button>
        <p id="result" class="hidden"></p>
    </div>
    <script>
        function checkGuess() {
            const userGuess = document.getElementById('userInput').value;
            const result = document.getElementById('result');
            if (userGuess.toLowerCase() === 'film name') {
                result.textContent = 'Correct! 🎉';
                result.classList.remove('hidden');
            } else {
                result.textContent = 'Try again!';
                result.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
